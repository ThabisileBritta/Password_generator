
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1.5rem 0; max-width: 480px; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; }
.pwd-display { display: flex; align-items: center; gap: 8px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; margin-bottom: 1.25rem; }
.pwd-text { flex: 1; font-family: var(--font-mono); font-size: 15px; color: var(--color-text-primary); word-break: break-all; line-height: 1.5; }
.copy-btn { font-size: 12px; flex-shrink: 0; }
.copy-btn.copied { color: var(--color-text-success); border-color: var(--color-border-success); }
.slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
.slider-row label { font-size: 13px; color: var(--color-text-secondary); width: 80px; }
.slider-row input[type=range] { flex: 1; }
.slider-row .val { font-size: 14px; font-weight: 500; min-width: 28px; text-align: right; color: var(--color-text-primary); }
.checks { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
.check-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; }
.check-row input { cursor: pointer; }
.strength-bar { height: 6px; border-radius: 3px; background: var(--color-background-secondary); margin-bottom: 6px; overflow: hidden; }
.strength-fill { height: 100%; border-radius: 3px; transition: width 0.2s, background 0.2s; }
.strength-label { font-size: 12px; color: var(--color-text-secondary); display: flex; justify-content: space-between; margin-bottom: 1.25rem; }
.gen-btn { width: 100%; }
.copied-msg { font-size: 12px; color: var(--color-text-success); text-align: center; margin-top: 8px; min-height: 18px; }
</style>

<div class="wrap">
  <div class="card">
    <div class="pwd-display">
      <span class="pwd-text" id="pwd-text">Click generate</span>
      <button class="copy-btn" id="copy-btn" onclick="copyPwd()">Copy</button>
    </div>

    <div class="slider-row">
      <label>Length</label>
      <input type="range" id="length" min="8" max="32" value="16" step="1" oninput="updateLength()" />
      <span class="val" id="len-val">16</span>
    </div>

    <div class="checks">
      <label class="check-row"><input type="checkbox" id="upper" checked onchange="generate()" /> Uppercase</label>
      <label class="check-row"><input type="checkbox" id="lower" checked onchange="generate()" /> Lowercase</label>
      <label class="check-row"><input type="checkbox" id="nums" checked onchange="generate()" /> Numbers</label>
      <label class="check-row"><input type="checkbox" id="syms" onchange="generate()" /> Symbols</label>
    </div>

    <div class="strength-bar"><div class="strength-fill" id="strength-fill" style="width:0%"></div></div>
    <div class="strength-label"><span id="strength-text">—</span><span id="entropy-text"></span></div>

    <button class="gen-btn" onclick="generate()">Generate password</button>
    <div class="copied-msg" id="copied-msg"></div>
  </div>
</div>

<script>
const CHARS = {
  upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lower: 'abcdefghijklmnopqrstuvwxyz',
  nums: '0123456789',
  syms: '!@#$%^&*()_+-=[]{}|;:,.<>?'
};

function generate() {
  const len = parseInt(document.getElementById('length').value);
  const sets = ['upper','lower','nums','syms'].filter(k => document.getElementById(k).checked);
  if (sets.length === 0) { document.getElementById('pwd-text').textContent = 'Select at least one option'; return; }
  let pool = sets.map(k => CHARS[k]).join('');
  let pwd = sets.map(k => CHARS[k][Math.floor(Math.random() * CHARS[k].length)]);
  while (pwd.length < len) pwd.push(pool[Math.floor(Math.random() * pool.length)]);
  pwd = pwd.sort(() => Math.random() - 0.5).join('');
  document.getElementById('pwd-text').textContent = pwd;
  updateStrength(pwd, pool.length);
  document.getElementById('copy-btn').classList.remove('copied');
  document.getElementById('copy-btn').textContent = 'Copy';
  document.getElementById('copied-msg').textContent = '';
}

function updateStrength(pwd, poolSize) {
  const entropy = Math.round(pwd.length * Math.log2(poolSize));
  const fill = document.getElementById('strength-fill');
  const label = document.getElementById('strength-text');
  const entLabel = document.getElementById('entropy-text');
  entLabel.textContent = entropy + ' bits entropy';
  let pct, color, text;
  if (entropy < 40) { pct = 20; color = '#E24B4A'; text = 'Weak'; }
  else if (entropy < 60) { pct = 45; color = '#EF9F27'; text = 'Fair'; }
  else if (entropy < 80) { pct = 70; color = '#639922'; text = 'Strong'; }
  else { pct = 100; color = '#1D9E75'; text = 'Very strong'; }
  fill.style.width = pct + '%';
  fill.style.background = color;
  label.textContent = text;
  label.style.color = color;
}

function updateLength() {
  document.getElementById('len-val').textContent = document.getElementById('length').value;
  generate();
}

function copyPwd() {
  const pwd = document.getElementById('pwd-text').textContent;
  if (!pwd || pwd === 'Click generate' || pwd === 'Select at least one option') return;
  navigator.clipboard.writeText(pwd).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    document.getElementById('copied-msg').textContent = 'Password copied to clipboard';
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
      document.getElementById('copied-msg').textContent = '';
    }, 2000);
  });
}

generate();
</script>
